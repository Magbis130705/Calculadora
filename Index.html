<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calculadora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      padding: 16px;
    }

    .calculadora {
      width: min(92vw, 420px);
      background: #4b4141;
      border-radius: 4px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .nombre {
      color: #fff;
      font-size: clamp(12px, 2.8vw, 14px);
      margin-bottom: 8px;
      text-align: left;
      padding-left: 6px;
    }

    #pantalla {
      width: 100%;
      height: clamp(72px, 18vw, 92px);
      border: none;
      outline: none;
      border-radius: 18px;
      background: #ddd;
      margin-bottom: 18px;
      font-size: clamp(28px, 8vw, 40px);
      text-align: right;
      padding: 0 14px;
      color: #111;
    }

    .botones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(10px, 2.5vw, 16px);
      justify-items: center;
      align-items: center;
    }

    button {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 16px;
      font-size: clamp(28px, 8vw, 40px);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:active {
      transform: scale(0.96);
    }

    .numero,
    .operador {
      background: #fff;
      color: #111;
    }

    .rojo {
      background: #ff1d1d;
      color: #fff;
    }

    .igual {
      background: #000;
      color: #fff;
    }

    .boton-vacio {
      visibility: hidden;
    }

    /* Ajuste extra para pantallas muy pequeñas */
    @media (max-width: 380px) {
      .calculadora {
        padding: 14px;
      }

      #pantalla {
        margin-bottom: 16px;
      }

      .botones {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="calculadora">
    <div class="nombre">Create by MAGBIS & MARTHA</div>

    <input type="text" id="pantalla" readonly />

    <div class="botones">
      <button class="rojo" onclick="limpiar()">C</button>
      <button class="boton-vacio"></button>
      <button class="boton-vacio"></button>
      <button class="rojo" onclick="borrar()">&#60;</button>

      <button class="numero" onclick="agregar('7')">7</button>
      <button class="numero" onclick="agregar('8')">8</button>
      <button class="numero" onclick="agregar('9')">9</button>
      <button class="operador" onclick="agregar('/')">/</button>

      <button class="numero" onclick="agregar('4')">4</button>
      <button class="numero" onclick="agregar('5')">5</button>
      <button class="numero" onclick="agregar('6')">6</button>
      <button class="operador" onclick="agregar('*')">x</button>

      <button class="numero" onclick="agregar('1')">1</button>
      <button class="numero" onclick="agregar('2')">2</button>
      <button class="numero" onclick="agregar('3')">3</button>
      <button class="operador" onclick="agregar('-')">-</button>

      <button class="numero" onclick="agregar('0')">0</button>
      <button class="numero" onclick="agregar('.')">.</button>
      <button class="operador" onclick="agregar('+')">+</button>
      <button class="igual" onclick="calcular()">=</button>
    </div>
  </div>

  <script>
    const pantalla = document.getElementById("pantalla");

    function agregar(valor) {
      pantalla.value += valor;
    }

    function limpiar() {
      pantalla.value = "";
    }

    function borrar() {
      pantalla.value = pantalla.value.slice(0, -1);
    }

    function calcular() {
      try {
        pantalla.value = eval(pantalla.value);
      } catch (error) {
        pantalla.value = "Error";
      }
    }
  </script>

</body>
</html>
